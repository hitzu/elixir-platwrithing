id: qualifier
flow: qualifier
host: localhost
path: /qualifier

description: >
  Debt relief qualifier ($10,000 USD threshold). Steps are minimal for speed.
  LiveView `phx-change` needs real keystrokes — use `type` with `delay_ms: 0`,
  not Playwright `fill()`, or submit will see empty fields.

fields:
  - name: full_name
    selector: "[data-testid='input-full-name']"
    type: text
    required: true

  - name: email
    selector: "[data-testid='input-email']"
    type: email
    required: true

  - name: debt_amount
    selector: "[data-testid='input-debt-amount']"
    type: number
    required: true

behavior:
  eligibility_check:
    condition: debt_amount >= 10000
    result_eligible:
      selector: "[data-testid='eligible-message']"
      text: "Eligible"
    result_not_eligible:
      selector: "[data-testid='not-eligible-message']"
      text: "Not eligible"

  on_submit_success:
    selector: "[data-testid='success-message']"
    text: "Your profile has been accepted"

  validation_errors:
    - field: full_name
      selector: "[data-testid='error-full-name']"
    - field: email
      selector: "[data-testid='error-email']"
    - field: debt_amount
      selector: "[data-testid='error-debt-amount']"

steps:
  - action: navigate
    url: "http://localhost:4000/qualifier"

  - action: type
    selector: "[data-testid='input-full-name']"
    value: "Jane Doe"
    delay_ms: 0

  - action: type
    selector: "[data-testid='input-email']"
    value: "jane@example.com"
    delay_ms: 0

  - action: type
    selector: "[data-testid='input-debt-amount']"
    value: "15000"
    delay_ms: 0

  - action: click
    selector: "[data-testid='submit-button']"

  - action: assert_text
    selector: "[data-testid='success-message']"
    contains: "Your profile has been accepted"

assertions:
  - Submitting valid data shows the success message text above
