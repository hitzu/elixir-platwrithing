id: qualifier
flow: qualifier
host: localhost
path: /qualifier

description: >
  Checks whether a user qualifies for the debt relief program based on their
  declared debt amount. Eligible threshold is $10,000 USD.

fields:
  - name: full_name
    selector: "[data-testid='input-full-name']"
    type: text
    required: true

  - name: email
    selector: "[data-testid='input-email']"
    type: email
    required: true

  - name: debt_amount
    selector: "[data-testid='input-debt-amount']"
    type: number
    required: true

behavior:
  eligibility_check:
    condition: debt_amount >= 10000
    result_eligible:
      selector: "[data-testid='eligible-message']"
      text: "Eligible"
      note: Renders inline on phx-change (no submit needed)
    result_not_eligible:
      selector: "[data-testid='not-eligible-message']"
      text: "Not eligible"

  on_submit_success:
    selector: "[data-testid='success-message']"
    text: "Your profile has been accepted"
    note: Form hides after success message appears

  validation_errors:
    - field: full_name
      selector: "[data-testid='error-full-name']"
      trigger: empty on submit
    - field: email
      selector: "[data-testid='error-email']"
      trigger: missing or invalid format on submit
    - field: debt_amount
      selector: "[data-testid='error-debt-amount']"
      trigger: non-numeric or negative value on submit

# ---------------------------------------------------------------------------
# Happy path — eligible user
# ---------------------------------------------------------------------------
steps:
  - action: navigate
    url: "http://localhost:4000/qualifier"
    description: Open qualifier flow

  - action: wait
    selector: "[data-testid='input-full-name']"
    description: Wait for form to be ready

  - action: fill
    selector: "[data-testid='input-full-name']"
    value: "Jane Doe"

  - action: fill
    selector: "[data-testid='input-email']"
    value: "jane@example.com"

  - action: fill
    selector: "[data-testid='input-debt-amount']"
    value: "15000"
    description: Above threshold — should show Eligible inline

  - action: assert_visible
    selector: "[data-testid='eligible-message']"
    description: Eligible banner appears before submit

  - action: click
    selector: "[data-testid='submit-button']"
    description: Submit the form

  - action: assert_visible
    selector: "[data-testid='success-message']"

  - action: assert_text
    selector: "[data-testid='success-message']"
    contains: "Your profile has been accepted"

assertions:
  - Qualifier page title is visible
  - Debt amount >= 10000 shows "Eligible" inline
  - Debt amount < 10000 shows "Not eligible" inline
  - Empty submit shows all three validation errors
  - Valid submit shows "Your profile has been accepted"
  - Form hides after successful submission
